<html lang="ru">
<head>

    <style>
        input[type="button"] {
            background-color: #04AA6D; /* цвет фона */
    border: none; /* отсутствие рамки */
    color: white; /* цвет текста */
    padding: 16px 32px; /* отступы */
    text-decoration: none; /* отсутствие подчеркивания */
    margin: 4px 2px; /* отступы */
    cursor: pointer; /* указатель мыши */
    border-radius: 5px; /* радиус углов */
    font-size: 16px; /* размер шрифта */
    font-weight: bold; /* жирность шрифта */
        }
    </style>
</head>
<body>
    <input type="button" value="Кнопка" id="button">
</body>
