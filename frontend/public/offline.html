<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkoutShedule Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #000214;
        color: #fff;
        font-family: Roboto, sans-serif;
      }

      main {
        width: min(100%, 380px);
        border: 1px solid #2a3140;
        border-radius: 28px;
        background: #12151c;
        padding: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #8e97a8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет сети</h1>
      <p>Приложение установлено и часть экранов доступна офлайн. Проверь подключение и попробуй снова.</p>
    </main>
  </body>
</html>
